[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "leancodeparser"
version = "0.1.0"
description = "Lean code parser focused on processing Lean source generated by large language models"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
keywords = ["lean", "code-parser", "proof-assistant"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering",
]

[tool.setuptools]
# Explicit package name: package files live in this directory
packages = ["LeanCodeParser"]

[tool.setuptools.package-dir]
"LeanCodeParser" = "."

[tool.setuptools.package-data]
"LeanCodeParser" = ["*.md", "*.txt"]

